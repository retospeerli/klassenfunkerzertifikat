<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funkerschule 15 – Zertifikat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <h1>Funkerschule 15</h1>

  <div class="form">
    <input id="name" placeholder="Vorname Nachname" />

    <input id="pw1" type="password" placeholder="Passwort 1" />
    <input id="pw2" type="password" placeholder="Passwort 2" />
    <input id="pw3" type="password" placeholder="Passwort 3" />

    <button id="check">Zertifikat prüfen</button>
    <div id="msg"></div>
  </div>

  <div id="certContainer"></div>
</div>

<template id="certTemplate">
  <div class="cert">
    <div class="overlay">
      <div class="flags" id="flags"></div>
      <div class="student" id="student"></div>
    </div>
    <button id="printBtn">PDF exportieren</button>
  </div>
</template>

<script src="app.js"></script>
</body>
</html>
