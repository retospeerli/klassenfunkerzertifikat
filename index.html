<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funkerschule 15 – Zertifikats-App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>Funkerschule 15</h1>
      <p class="subtitle">Zertifikat erstellen</p>
    </header>

    <main class="main-grid">
      <section class="panel form-panel">
        <h2>Passwörter eingeben</h2>

        <div class="field-group">
          <label for="fullName">Vorname und Nachname</label>
          <input
            id="fullName"
            type="text"
            placeholder="z. B. Max Muster"
            autocomplete="name"
          />
        </div>

        <div class="field-group">
          <label for="pw1">Passwort 1</label>
          <input
            id="pw1"
            type="password"
            placeholder="Passwort eingeben"
            autocomplete="off"
          />
        </div>

        <div class="field-group">
          <label for="pw2">Passwort 2</label>
          <input
            id="pw2"
            type="password"
            placeholder="Passwort eingeben"
            autocomplete="off"
          />
        </div>

        <div class="field-group">
          <label for="pw3">Passwort 3</label>
          <input
            id="pw3"
            type="password"
            placeholder="Passwort eingeben"
            autocomplete="off"
          />
        </div>

        <div class="button-row">
          <button id="checkBtn" class="big-btn primary-btn" type="button">Zertifikat prüfen</button>
          <button id="resetBtn" class="big-btn secondary-btn" type="button">Zurücksetzen</button>
        </div>

        <div id="messageBox" class="message-box" aria-live="polite"></div>
      </section>

      <section class="panel status-panel">
        <h2>Status</h2>

        <div id="statusCard" class="status-card">
          <div>
            <h3>Klassenfunker/in Lizenz</h3>
            <p id="statusText">Noch nicht freigeschaltet</p>
          </div>
          <span id="statusBadge" class="status-badge locked">Gesperrt</span>
        </div>

        <div class="status-hint">
          <p>Das Zertifikat wird erst freigeschaltet, wenn alle drei korrekten Passwörter eingegeben wurden.</p>
        </div>
      </section>
    </main>

    <section class="panel certificates-panel">
      <h2>Dein Zertifikat</h2>
      <div id="certificatesContainer" class="certificates-container"></div>
    </section>
  </div>

  <template id="certificateCardTemplate">
    <article class="certificate-card">
      <div class="certificate-preview-wrapper">
        <div class="certificate-preview">
          <div class="cert-license-title">Klassenfunker/in</div>
          <div class="cert-license-subtitle">Lizenz</div>

          <div class="cert-name"></div>

          <div class="cert-can">kann:</div>

          <div class="cert-grid">
            <div class="cert-box">
              <h3>Rechtliches &amp; Technik</h3>
              <p>Frequenzen korrekt und regelkonform nutzen</p>
              <p>erlaubte und verbotene Funknutzung sicher unterscheiden</p>
            </div>

            <div class="cert-box">
              <h3>NATO-Buchstabieralphabet</h3>
              <p>Wörter, Namen und Rufzeichen korrekt buchstabieren</p>
              <p>gehörte Buchstabierungen sicher verstehen</p>
            </div>

            <div class="cert-box">
              <h3>Telegrafie &amp; Morsen</h3>
              <p>einfache Nachrichten in Morse senden</p>
              <p>Morsezeichen sicher erkennen und verstehen</p>
            </div>

            <div class="cert-box">
              <h3>Praktische Anwendung &amp; Funkdisziplin</h3>
              <p>ein Handfunkgerät sicher bedienen</p>
              <p>Funkgespräche klar, kurz und regelkonform führen</p>
            </div>
          </div>

          <div class="cert-alpha-line">Alpha Bravo Charlie</div>

          <div class="cert-footer">
            <div class="cert-signature">Kursleiter</div>
            <div class="cert-date"></div>
          </div>
        </div>
      </div>

      <div class="certificate-actions">
        <button class="big-btn export-btn" type="button">Zertifikat als PDF exportieren</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
